<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title> AK Planner|پلنر | مدیریت روزانه</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="icon" href="logo.png/logo.png">
<style>
  :root{
    --bg:#F5F6FA;
    --sidebar:#11162A;
    --sidebar-soft:#1B2140;
    --sidebar-line:#272E52;
    --card:#FFFFFF;
    --border:#E6E8F0;
    --text:#12172B;
    --muted:#7B8199;
    --on-dark:#E9EBF5;
    --on-dark-muted:#8B93B5;
    --accent:#5B5FEF;
    --accent-soft:#EEEEFC;
    --teal:#12B6A8;
    --teal-soft:#E4F8F5;
    --amber:#F5A524;
    --red:#EF4A5F;
    --radius-lg:18px;
    --radius-md:12px;
    --radius-sm:8px;
    --shadow:0 1px 2px rgba(17,22,42,.04), 0 12px 28px -14px rgba(17,22,42,.16);
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--bg);
    font-family:'Vazirmatn', sans-serif;
    color:var(--text);
    min-height:100vh;
  }
  .app{
    max-width:1180px;
    margin:0 auto;
    min-height:100vh;
    display:grid;
    grid-template-columns: 300px 1fr;
    box-shadow: var(--shadow);
  }
  @media (max-width: 820px){
    .app{grid-template-columns: 1fr;}
  }

  /* ---------- Sidebar ---------- */
  .sidebar{
    background: linear-gradient(180deg, var(--sidebar), #0C0F1F);
    color:var(--on-dark);
    padding:26px 22px 30px;
    display:flex;
    flex-direction:column;
    gap:26px;
  }
  .brand{display:flex; align-items:center; gap:10px;}
  .brand .logo{
    width:34px;height:34px;border-radius:10px;
    background:linear-gradient(135deg, var(--accent), #8B8EF5);
    display:flex;align-items:center;justify-content:center;
    font-weight:800; color:#fff; font-size:15px;
  }
  .brand b{font-size:17px; font-weight:700;}

  .side-block{
    background:var(--sidebar-soft);
    border:1px solid var(--sidebar-line);
    border-radius:var(--radius-md);
    padding:16px;
  }
  .side-title{
    font-size:12.5px; font-weight:700; color:var(--on-dark-muted);
    display:flex; align-items:center; justify-content:space-between; margin-bottom:12px;
  }
  .cal-nav{display:flex; gap:2px;}
  .cal-nav button{
    width:24px;height:24px;border:none;border-radius:7px;background:transparent;color:var(--on-dark-muted);
    cursor:pointer; font-size:14px;
  }
  .cal-nav button:hover{background:var(--sidebar-line); color:var(--on-dark);}

  .grid7{display:grid; grid-template-columns:repeat(7,1fr); gap:3px; text-align:center;}
  .wd{font-size:10.5px; color:var(--on-dark-muted); padding-bottom:6px;}
  .cal-cell{
    aspect-ratio:1; display:flex;align-items:center;justify-content:center;
    border-radius:8px; font-size:12px; cursor:pointer; color:var(--on-dark); position:relative;
  }
  .cal-cell:hover{background:var(--sidebar-line);}
  .cal-cell.today{box-shadow: inset 0 0 0 1.4px var(--teal); color:#fff; font-weight:700;}
  .cal-cell.selected{background:var(--accent); color:#fff; font-weight:700;}
  .cal-cell.empty{visibility:hidden;}
  .cal-cell .dot{position:absolute; bottom:2px; width:4px;height:4px;border-radius:50%; background:var(--amber);}
  .cal-cell.selected .dot{background:#fff;}

  .today-btn{
    margin-top:12px; width:100%; padding:9px; border:none; border-radius:var(--radius-sm);
    background:var(--sidebar-line); color:var(--on-dark); font-family:inherit; font-size:12.5px;
    cursor:pointer; font-weight:600;
  }
  .today-btn:hover{background:#323A66;}

  .note-box textarea{
    width:100%; min-height:110px; resize:vertical; border:1px solid var(--sidebar-line);
    background:#0F1330; color:var(--on-dark); border-radius:var(--radius-sm);
    padding:11px; font-family:inherit; font-size:13px; outline:none; line-height:1.7;
  }
  .note-box textarea::placeholder{color:var(--on-dark-muted);}
  .note-box textarea:focus{border-color:var(--accent);}
  .savehint{font-size:10.5px; color:var(--on-dark-muted); margin-top:8px;}

  .privacy-note{
    font-size:11px; color:var(--on-dark-muted); line-height:1.8; margin-top:auto;
    border-top:1px solid var(--sidebar-line); padding-top:14px;
  }

  /* ---------- Main ---------- */
  .main{padding:30px 34px 40px; background:var(--bg);}
  .topbar{display:flex; align-items:center; justify-content:space-between; gap:16px; flex-wrap:wrap; margin-bottom:26px;}
  .date-head{display:flex; align-items:center; gap:16px;}
  .nav-btn{
    width:36px;height:36px;border-radius:50%;border:1px solid var(--border);
    background:var(--card); cursor:pointer; font-size:16px; color:var(--text);
    display:flex;align-items:center;justify-content:center; box-shadow:var(--shadow);
  }
  .nav-btn:hover{border-color:var(--accent); color:var(--accent);}
  .date-text .weekday{font-size:22px; font-weight:800;}
  .date-text .sub{color:var(--muted); font-size:13.5px; margin-top:2px;}

  .stats{display:flex; gap:12px;}
  .stat-card{
    background:var(--card); border:1px solid var(--border); border-radius:var(--radius-md);
    padding:10px 18px; text-align:center; min-width:82px; box-shadow:var(--shadow);
  }
  .stat-card .num{font-size:20px; font-weight:800;}
  .stat-card .lbl{font-size:11px; color:var(--muted); margin-top:2px;}
  .stat-card.accent .num{color:var(--accent);}
  .stat-card.teal .num{color:var(--teal);}

  .panel{
    background:var(--card); border:1px solid var(--border); border-radius:var(--radius-lg);
    box-shadow:var(--shadow); padding:22px 24px;
  }

  .progress-row{display:flex; align-items:center; gap:14px; margin-bottom:20px;}
  .progress-bar{flex:1; height:9px; background:var(--accent-soft); border-radius:6px; overflow:hidden;}
  .progress-bar > i{display:block; height:100%; width:0%; border-radius:6px;
    background:linear-gradient(90deg, var(--accent), var(--teal)); transition:width .35s ease;}
  .progress-num{font-weight:700; font-size:13px; color:var(--muted); white-space:nowrap;}

  .add-row{display:flex; gap:10px; margin-bottom:22px;}
  .add-row input[type="text"]{
    flex:1; border:1.4px solid var(--border); border-radius:var(--radius-md);
    padding:13px 16px; font-family:inherit; font-size:14.5px; background:#FBFBFE; outline:none;
  }
  .add-row input[type="text"]:focus{border-color:var(--accent); background:#fff;}
  .prio-select{display:flex; gap:6px; align-self:center; background:#FBFBFE; border:1.4px solid var(--border); border-radius:var(--radius-md); padding:4px;}
  .prio-pill{
    padding:8px 12px; border-radius:8px; cursor:pointer; font-size:12px; font-weight:600; color:var(--muted);
    display:flex; align-items:center; gap:6px;
  }
  .prio-pill i{width:7px;height:7px;border-radius:50%; display:block;}
  .prio-pill[data-p="low"] i{background:var(--teal);}
  .prio-pill[data-p="medium"] i{background:var(--amber);}
  .prio-pill[data-p="high"] i{background:var(--red);}
  .prio-pill.active{background:var(--card); color:var(--text); box-shadow:var(--shadow);}
  .add-btn{
    background:var(--accent); color:#fff; border:none; border-radius:var(--radius-md);
    padding:0 24px; font-family:inherit; font-size:14.5px; cursor:pointer; font-weight:700;
  }
  .add-btn:hover{background:#4A4EE0;}

  ul.tasks{list-style:none; margin:0; padding:0; display:flex; flex-direction:column; gap:8px;}
  ul.tasks li{
    display:flex; align-items:center; gap:12px;
    padding:13px 14px; border:1px solid var(--border); border-radius:var(--radius-md);
    background:#FBFBFE; transition:.15s;
  }
  ul.tasks li:hover{border-color:#D9DCEC; background:#fff;}
  .prio-bar{width:4px; align-self:stretch; border-radius:4px; flex:0 0 auto;}
  li[data-p="low"] .prio-bar{background:var(--teal);}
  li[data-p="medium"] .prio-bar{background:var(--amber);}
  li[data-p="high"] .prio-bar{background:var(--red);}

  .check{
    width:22px;height:22px;border-radius:7px;border:1.8px solid #C7CBDC;
    cursor:pointer; flex:0 0 auto; position:relative; background:#fff; transition:.15s;
  }
  .check.done{background:var(--teal); border-color:var(--teal);}
  .check.done::after{
    content:"✓"; position:absolute; inset:0; display:flex; align-items:center; justify-content:center;
    color:#fff; font-size:13px; font-weight:700;
  }
  .task-text{flex:1; font-size:14.5px; word-break:break-word;}
  .task-text.done{color:var(--muted); text-decoration:line-through;}
  .del-btn{
    border:none; background:transparent; cursor:pointer; color:var(--muted); font-size:15px;
    width:28px;height:28px; border-radius:8px; opacity:0; transition:.15s;
  }
  ul.tasks li:hover .del-btn{opacity:1;}
  .del-btn:hover{background:#FDEAEC; color:var(--red);}

  .empty-state{ text-align:center; padding:44px 20px; color:var(--muted);}
  .empty-state .big{font-size:30px; margin-bottom:10px;}

  .foot-row{display:flex; justify-content:flex-end; margin-top:18px;}
  .clear-btn{
    border:1.4px solid var(--border); background:#fff; color:var(--muted);
    border-radius:var(--radius-sm); padding:8px 16px; font-family:inherit; font-size:12.5px; cursor:pointer; font-weight:600;
  }
  .clear-btn:hover{border-color:var(--red); color:var(--red);}
</style>
<link rel="icon" href="logo.png">
</head>
<body>
  <center>
    <h1>AK Planner</h1>
</center>

  <hr>
<h2>👨‍💻طراح و توسعه‌دهنده:
جناب آقای رایبد اکبرلو.</h2>


<div class="app">
  <aside class="sidebar">
    <div class="brand">
      <div class="logo">پ</div>
      <b>پلنر</b>
    </div>

    <div class="side-block">
      <div class="side-title">
        <span id="calLabel">—</span>
        <div class="cal-nav">
          <button id="calNext">‹</button>
          <button id="calPrev">›</button>
        </div>
      </div>
      <div class="grid7" id="calGrid"></div>
      <button class="today-btn" id="gotoToday">برو به امروز</button>
    </div>

    <div class="side-block note-box">
      <div class="side-title"><span>یادداشت روز</span></div>
      <textarea id="noteBox" placeholder="نکته‌ای برای این روز بنویس..."></textarea>
      <div class="savehint">ذخیره‌ی خودکار</div>
    </div>

    <div class="privacy-note">تمام اطلاعات فقط داخل مرورگر شما ذخیره می‌شود و به هیچ سروری ارسال نمی‌گردد.</div>
  </aside>

  <main class="main">
    <div class="topbar">
      <div class="date-head">
        <button class="nav-btn" id="prevDay">›</button>
        <div class="date-text">
          <div class="weekday" id="weekdayLabel">—</div>
          <div class="sub" id="fullDateLabel">—</div>
        </div>
        <button class="nav-btn" id="nextDay">‹</button>
      </div>
      <div class="stats">
        <div class="stat-card"><div class="num" id="statTotal">۰</div><div class="lbl">کل کارها</div></div>
        <div class="stat-card teal"><div class="num" id="statDone">۰</div><div class="lbl">انجام‌شده</div></div>
        <div class="stat-card accent"><div class="num" id="statLeft">۰</div><div class="lbl">باقی‌مانده</div></div>
      </div>
    </div>

    <div class="panel">
      <div class="progress-row">
        <div class="progress-bar"><i id="progressFill"></i></div>
        <div class="progress-num" id="progressNum">۰٪</div>
      </div>

      <div class="add-row">
        <input type="text" id="taskInput" placeholder="یک کار تازه بنویس و اینتر بزن…">
        <div class="prio-select" id="prioSelect">
          <div class="prio-pill" data-p="low"><i></i>کم اهمنیت</div>
          <div class="prio-pill active" data-p="medium"><i></i>متوسط</div>
          <div class="prio-pill" data-p="high"><i></i>مهم</div>
        </div>
        <button class="add-btn" id="addBtn">افزودن</button>
      </div>

      <ul class="tasks" id="taskList"></ul>
      <div class="empty-state" id="emptyState" style="display:none;">
        <div class="big">✓</div>
        امروز هنوز کاری اضافه نکرده‌ای — یکی بنویس
      </div>

      <div class="foot-row">
        <button class="clear-btn" id="clearDone">پاک‌کردن کارهای انجام‌شده</button>
      </div>
    </div>
  </main>
</div>

<script>
(function(){
  "use strict";

  // ---------- Reliable Gregorian -> Jalali conversion (algorithmic, no ICU dependency) ----------
  const JALALI_MONTHS = ['فروردین','اردیبهشت','خرداد','تیر','مرداد','شهریور','مهر','آبان','آذر','دی','بهمن','اسفند'];
  const WEEKDAYS = ['شنبه','یکشنبه','دوشنبه','سه‌شنبه','چهارشنبه','پنجشنبه','جمعه'];
  const FA_DIGITS = ['۰','۱','۲','۳','۴','۵','۶','۷','۸','۹'];

  function faNum(n){
    return String(n).replace(/[0-9]/g, d => FA_DIGITS[+d]);
  }

  function toJalali(gy, gm, gd){
    const g_d_m = [0,31,59,90,120,151,181,212,243,273,304,334];
    const gy2 = (gm > 2) ? (gy + 1) : gy;
    let days = 355666 + (365 * gy) + Math.floor((gy2 + 3) / 4) - Math.floor((gy2 + 99) / 100) + Math.floor((gy2 + 399) / 400) + gd + g_d_m[gm - 1];
    let jy = -1595 + (33 * Math.floor(days / 12053));
    days %= 12053;
    jy += 4 * Math.floor(days / 1461);
    days %= 1461;
    if (days > 365){
      jy += Math.floor((days - 1) / 365);
      days = (days - 1) % 365;
    }
    let jm, jd;
    if (days < 186){
      jm = 1 + Math.floor(days / 31);
      jd = 1 + (days % 31);
    } else {
      jm = 7 + Math.floor((days - 186) / 30);
      jd = 1 + ((days - 186) % 30);
    }
    return { year: jy, month: jm, day: jd };
  }

  function jparts(date){
    const j = toJalali(date.getFullYear(), date.getMonth()+1, date.getDate());
    const weekday = WEEKDAYS[(date.getDay()+1) % 7]; // 0=Sat ... 6=Fri
    return { year:j.year, month:j.month, day:j.day, weekday };
  }

  function dateKey(d){
    const y=d.getFullYear(), m=String(d.getMonth()+1).padStart(2,'0'), day=String(d.getDate()).padStart(2,'0');
    return `${y}-${m}-${day}`;
  }

  // ---------- State ----------
  let selectedDate = new Date();
  selectedDate.setHours(0,0,0,0);
  let calViewDate = new Date(selectedDate);
  let currentPriority = 'medium';

  const STORE_TASKS = 'planner_tasks_v2';
  const STORE_NOTES = 'planner_notes_v2';

  function loadTasks(){ try{ return JSON.parse(localStorage.getItem(STORE_TASKS)) || {}; }catch(e){ return {}; } }
  function saveTasks(obj){ localStorage.setItem(STORE_TASKS, JSON.stringify(obj)); }
  function loadNotes(){ try{ return JSON.parse(localStorage.getItem(STORE_NOTES)) || {}; }catch(e){ return {}; } }
  function saveNotes(obj){ localStorage.setItem(STORE_NOTES, JSON.stringify(obj)); }

  let tasksDB = loadTasks();
  let notesDB = loadNotes();

  // ---------- DOM refs ----------
  const weekdayLabelEl = document.getElementById('weekdayLabel');
  const fullDateLabelEl = document.getElementById('fullDateLabel');
  const taskListEl = document.getElementById('taskList');
  const emptyStateEl = document.getElementById('emptyState');
  const progressFillEl = document.getElementById('progressFill');
  const progressNumEl = document.getElementById('progressNum');
  const statTotalEl = document.getElementById('statTotal');
  const statDoneEl = document.getElementById('statDone');
  const statLeftEl = document.getElementById('statLeft');
  const taskInputEl = document.getElementById('taskInput');
  const noteBoxEl = document.getElementById('noteBox');
  const calGridEl = document.getElementById('calGrid');
  const calLabelEl = document.getElementById('calLabel');

  function renderHeader(){
    const p = jparts(selectedDate);
    weekdayLabelEl.textContent = p.weekday;
    fullDateLabelEl.textContent = `${faNum(p.day)} ${JALALI_MONTHS[p.month-1]} ${faNum(p.year)}`;
  }

  function renderTasks(){
    const key = dateKey(selectedDate);
    const list = tasksDB[key] || [];
    taskListEl.innerHTML = '';
    emptyStateEl.style.display = list.length === 0 ? 'block' : 'none';

    list.forEach(task=>{
      const li = document.createElement('li');
      li.dataset.p = task.priority;
      li.innerHTML = `
        <span class="prio-bar"></span>
        <button class="check ${task.done?'done':''}" data-id="${task.id}"></button>
        <span class="task-text ${task.done?'done':''}">${escapeHtml(task.text)}</span>
        <button class="del-btn" data-id="${task.id}">✕</button>
      `;
      taskListEl.appendChild(li);
    });

    const total = list.length;
    const done = list.filter(t=>t.done).length;
    const left = total - done;
    statTotalEl.textContent = faNum(total);
    statDoneEl.textContent = faNum(done);
    statLeftEl.textContent = faNum(left);
    const pct = total ? Math.round(done/total*100) : 0;
    progressNumEl.textContent = faNum(pct) + '٪';
    progressFillEl.style.width = pct + '%';
  }

  function escapeHtml(str){
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
  }

  function renderNotes(){
    const key = dateKey(selectedDate);
    noteBoxEl.value = notesDB[key] || '';
  }

  function buildMonthGrid(anchorDate){
    let d = new Date(anchorDate);
    while (jparts(d).day !== 1){
      d.setDate(d.getDate()-1);
    }
    const firstDay = new Date(d);
    const firstWeekdayIndex = (firstDay.getDay()+1) % 7;

    const days = [];
    let cur = new Date(firstDay);
    let first = true;
    while(true){
      const p = jparts(cur);
      if(!first && p.day === 1) break;
      days.push(new Date(cur));
      cur.setDate(cur.getDate()+1);
      first = false;
    }
    const monthInfo = jparts(firstDay);
    return { firstWeekdayIndex, days, monthLabel: `${JALALI_MONTHS[monthInfo.month-1]} ${faNum(monthInfo.year)}` };
  }

  function renderCalendar(){
    const { firstWeekdayIndex, days, monthLabel } = buildMonthGrid(calViewDate);
    calLabelEl.textContent = monthLabel;
    calGridEl.innerHTML = '';

    const wdShort = ['ش','ی','د','س','چ','پ','ج'];
    wdShort.forEach(w=>{
      const el = document.createElement('div');
      el.className = 'wd';
      el.textContent = w;
      calGridEl.appendChild(el);
    });

    for(let i=0;i<firstWeekdayIndex;i++){
      const el = document.createElement('div');
      el.className = 'cal-cell empty';
      calGridEl.appendChild(el);
    }

    const todayKey = dateKey(new Date());
    const selKey = dateKey(selectedDate);

    days.forEach(dt=>{
      const el = document.createElement('div');
      const k = dateKey(dt);
      const p = jparts(dt);
      el.className = 'cal-cell';
      if(k === todayKey) el.classList.add('today');
      if(k === selKey) el.classList.add('selected');
      el.textContent = faNum(p.day);
      if((tasksDB[k]||[]).length){
        const dot = document.createElement('span');
        dot.className = 'dot';
        el.appendChild(dot);
      }
      el.addEventListener('click', ()=>{
        selectedDate = new Date(dt);
        selectedDate.setHours(0,0,0,0);
        renderAll();
      });
      calGridEl.appendChild(el);
    });
  }

  function renderAll(){
    renderHeader();
    renderTasks();
    renderNotes();
    renderCalendar();
  }

  document.getElementById('prevDay').addEventListener('click', ()=>{
    selectedDate.setDate(selectedDate.getDate()-1);
    calViewDate = new Date(selectedDate);
    renderAll();
  });
  document.getElementById('nextDay').addEventListener('click', ()=>{
    selectedDate.setDate(selectedDate.getDate()+1);
    calViewDate = new Date(selectedDate);
    renderAll();
  });
  document.getElementById('gotoToday').addEventListener('click', ()=>{
    selectedDate = new Date(); selectedDate.setHours(0,0,0,0);
    calViewDate = new Date(selectedDate);
    renderAll();
  });
  document.getElementById('calPrev').addEventListener('click', ()=>{
    calViewDate.setDate(calViewDate.getDate()+20);
    renderCalendar();
  });
  document.getElementById('calNext').addEventListener('click', ()=>{
    calViewDate.setDate(calViewDate.getDate()-20);
    renderCalendar();
  });

  document.getElementById('prioSelect').addEventListener('click', (e)=>{
    const pill = e.target.closest('.prio-pill');
    if(!pill) return;
    document.querySelectorAll('.prio-pill').forEach(d=>d.classList.remove('active'));
    pill.classList.add('active');
    currentPriority = pill.dataset.p;
  });

  function addTask(){
    const text = taskInputEl.value.trim();
    if(!text) return;
    const key = dateKey(selectedDate);
    if(!tasksDB[key]) tasksDB[key] = [];
    tasksDB[key].push({ id: Date.now()+'_'+Math.random().toString(36).slice(2,7), text, done:false, priority: currentPriority });
    saveTasks(tasksDB);
    taskInputEl.value = '';
    renderTasks();
    renderCalendar();
  }
  document.getElementById('addBtn').addEventListener('click', addTask);
  taskInputEl.addEventListener('keydown', (e)=>{ if(e.key==='Enter') addTask(); });

  taskListEl.addEventListener('click', (e)=>{
    const key = dateKey(selectedDate);
    const checkBtn = e.target.closest('.check');
    const delBtn = e.target.closest('.del-btn');
    if(checkBtn){
      const id = checkBtn.dataset.id;
      const list = tasksDB[key] || [];
      const t = list.find(x=>x.id===id);
      if(t){ t.done = !t.done; saveTasks(tasksDB); renderTasks(); }
    } else if(delBtn){
      const id = delBtn.dataset.id;
      tasksDB[key] = (tasksDB[key]||[]).filter(x=>x.id!==id);
      saveTasks(tasksDB);
      renderTasks();
      renderCalendar();
    }
  });

  document.getElementById('clearDone').addEventListener('click', ()=>{
    const key = dateKey(selectedDate);
    tasksDB[key] = (tasksDB[key]||[]).filter(t=>!t.done);
    saveTasks(tasksDB);
    renderTasks();
    renderCalendar();
  });

  let noteSaveTimer = null;
  noteBoxEl.addEventListener('input', ()=>{
    clearTimeout(noteSaveTimer);
    noteSaveTimer = setTimeout(()=>{
      const key = dateKey(selectedDate);
      notesDB[key] = noteBoxEl.value;
      saveNotes(notesDB);
    }, 300);
  });

  renderAll();
})();
</script>
</body>
</html>
